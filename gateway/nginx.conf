# =============================================================================
# NGINX API Gateway — MLOps Translation Service
# =============================================================================
# Runtime environment variables consumed:
#   NGINX_API_KEY — the valid API key accepted on protected routes
# =============================================================================

worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid       /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    # -------------------------------------------------------------------------
    # JSON structured access log
    # api_key_masked: exposes only the first 4 characters to avoid leaking
    # secrets while still allowing correlation in log analysis.
    # -------------------------------------------------------------------------
    map $http_x_api_key $api_key_masked {
        default                 "";
        "~^(?P<prefix>.{4}).*$" "${prefix}***";
    }

    log_format json_access escape=json
        '{'
            '"time":"$time_iso8601",'
            '"method":"$request_method",'
            '"uri":"$request_uri",'
            '"status":$status,'
            '"bytes_sent":$bytes_sent,'
            '"api_key":"$api_key_masked",'
            '"upstream_response_time":"$upstream_response_time",'
            '"request_id":"$request_id"'
        '}';

    access_log /var/log/nginx/access.log json_access;

    # -------------------------------------------------------------------------
    # Rate limiting — applied only to authenticated (protected) routes.
    # Zone keyed on the API key so each client is limited independently.
    # -------------------------------------------------------------------------
    limit_req_zone $http_x_api_key zone=per_key:10m rate=10r/s;

    # -------------------------------------------------------------------------
    # API key validation: maps the incoming header to a boolean result.
    # The valid key is injected at runtime via the NGINX_API_KEY env variable.
    # -------------------------------------------------------------------------
    map $http_x_api_key $api_key_valid {
        default             0;
        "${NGINX_API_KEY}"  1;
    }

    # -------------------------------------------------------------------------
    # General proxy settings
    # -------------------------------------------------------------------------
    proxy_http_version 1.1;
    proxy_set_header   Host              $host;
    proxy_set_header   X-Real-IP         $remote_addr;
    proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header   X-Forwarded-Proto $scheme;
    proxy_set_header   X-Request-ID      $request_id;

    proxy_connect_timeout 5s;
    proxy_read_timeout    60s;
    proxy_send_timeout    60s;

    # -------------------------------------------------------------------------
    # Upstream — FastAPI application
    # -------------------------------------------------------------------------
    upstream api {
        server    api:8000;
        keepalive 32;
    }

    # =========================================================================
    # Server block
    # =========================================================================
    server {
        listen      80;
        server_name _;

        # Propagate the generated request ID to the downstream client.
        add_header X-Request-ID        $request_id always;

        # Security headers on every response.
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options        "DENY"    always;

        # Strip upstream Server header to avoid leaking implementation info.
        proxy_hide_header Server;

        # ---------------------------------------------------------------------
        # Public endpoint — no authentication or rate limiting
        # ---------------------------------------------------------------------
        location = /health {
            proxy_pass http://api/health;
        }

        # ---------------------------------------------------------------------
        # Protected endpoints — require a valid API key + rate limiting
        # ---------------------------------------------------------------------
        location / {
            # Reject requests that carry no key at all.
            if ($http_x_api_key = "") {
                return 401 '{"error": "API key required"}';
            }

            # Reject requests with a key that does not match the configured one.
            if ($api_key_valid = "0") {
                return 403 '{"error": "Invalid API key"}';
            }

            limit_req        zone=per_key burst=20 nodelay;
            limit_req_status 429;

            proxy_pass http://api;
        }
    }
}
