global:
  scrape_interval:     15s
  evaluation_interval: 15s
  external_labels:
    environment: "local"
    project:     "mlops-challenge"

scrape_configs:
  - job_name: inference_api
    scrape_interval: 15s
    metrics_path:    /metrics
    static_configs:
      - targets:
          - "api:8000"
        labels:
          instance: "api:8000"
