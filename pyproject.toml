[tool.ruff]
target-version = "py311"
line-length = 88
exclude = [
    ".git",
    ".venv",
    "__pycache__",
    "data/",
    "artifacts/",
    "dist/",
    "build/",
]

[tool.ruff.lint]
select = ["E", "W", "F", "I", "B", "C4", "RUF"]
ignore = [
    "E501",   # line-too-long: black é a fonte da verdade para comprimento de linha
    "B008",   # function-call-in-default-argument: padrão do FastAPI com Depends()
    "RUF012", # mutable-class-attributes: falso positivo com modelos Pydantic
]

[tool.ruff.lint.per-file-ignores]
"__init__.py"     = ["F401"]          # re-exports legítimos
"tests/**/*.py"   = ["S101", "ARG001"] # assert é o idioma do pytest
"ml/**/*.py"      = ["T201"]           # print() é aceitável em scripts de treino
"pipeline/**/*.py" = ["T201", "S603", "S607"] # subprocess e print em scripts de pipeline

[tool.ruff.lint.flake8-bugbear]
extend-immutable-calls = [
    "fastapi.Depends",
    "fastapi.Query",
    "fastapi.Path",
    "fastapi.Body",
    "fastapi.Header",
]

[tool.black]
line-length = 88
target-version = ["py311"]
extend-exclude = '''
/(
    data
  | artifacts
  | \.git
  | \.venv
)/
'''
